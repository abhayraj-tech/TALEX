<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <!-- Main blue-to-green gradient (left=green, right=blue matching the logo) -->
    <linearGradient id="figureGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5bc840;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2aaa8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a6fd4;stop-opacity:1" />
    </linearGradient>
    <!-- Star gradient (bright green) -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ed321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ab840;stop-opacity:1" />
    </linearGradient>
    <!-- Orbit ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5bc840;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2aaa8a;stop-opacity:1" />
    </linearGradient>
    <!-- Cap gradient (dark blue-green) -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a7a6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4a8a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════
       ORBIT RING — tilted ellipse around the star
  ════════════════════════════════════════════ -->
  <ellipse cx="196" cy="68" rx="46" ry="13"
           fill="none" stroke="url(#ringGrad)" stroke-width="5"
           transform="rotate(-8, 196, 68)"/>

  <!-- ═══════════════════════════════════════════
       4-POINT STAR (sparkle) at top
  ════════════════════════════════════════════ -->
  <!-- Vertical spike -->
  <path d="M196 28 C197 38 200 44 196 52 C192 44 195 38 196 28Z" fill="url(#starGrad)"/>
  <!-- Horizontal spike -->
  <path d="M178 40 C186 41 192 43 196 40 C192 37 186 39 178 40Z" fill="url(#starGrad)"/>
  <path d="M214 40 C206 41 200 43 196 40 C200 37 206 39 214 40Z" fill="url(#starGrad)"/>
  <!-- Diagonal spikes -->
  <path d="M182 30 C187 36 190 40 196 40 C192 35 188 32 182 30Z" fill="url(#starGrad)" opacity="0.7"/>
  <path d="M210 30 C205 36 202 40 196 40 C200 35 204 32 210 30Z" fill="url(#starGrad)" opacity="0.7"/>

  <!-- ═══════════════════════════════════════════
       FIGURE — dynamic leaping person
       Head, raised arm, body, sweeping arms & legs
  ════════════════════════════════════════════ -->

  <!-- Head (circle) -->
  <circle cx="204" cy="88" r="13" fill="url(#figureGrad)"/>

  <!-- Raised right arm (up-left toward star) -->
  <path d="M200 98 Q188 78 186 62" 
        stroke="url(#figureGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Body torso -->
  <path d="M204 100 Q204 118 202 132"
        stroke="url(#figureGrad)" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Left sweeping arm (wide, going left — the big blue sweep) -->
  <path d="M200 108 Q172 112 148 122 Q136 128 128 138"
        stroke="url(#figureGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Right sweeping arm (going right) -->
  <path d="M208 108 Q228 112 248 118 Q260 122 268 128"
        stroke="url(#figureGrad)" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Left leg (going down-left) -->
  <path d="M200 132 Q184 152 168 172 Q160 182 156 192"
        stroke="url(#figureGrad)" stroke-width="15" stroke-linecap="round" fill="none"/>

  <!-- Right leg (going down-right, the green sweep) -->
  <path d="M204 132 Q216 150 228 166 Q238 178 244 190"
        stroke="url(#figureGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- ═══════════════════════════════════════════
       GRADUATION CAP on head
  ════════════════════════════════════════════ -->
  <!-- Cap board (mortarboard flat top) -->
  <polygon points="196,72 222,80 196,88 170,80" fill="url(#capGrad)"/>
  <!-- Cap top dome -->
  <rect x="188" y="72" width="16" height="10" rx="2" fill="url(#capGrad)"/>
  <!-- Tassel string -->
  <line x1="222" y1="80" x2="226" y2="94" stroke="#1a4a6a" stroke-width="2.5"/>
  <!-- Tassel end -->
  <circle cx="226" cy="96" r="3" fill="#1a4a6a"/>
  <line x1="224" y1="98" x2="222" y2="106" stroke="#1a4a6a" stroke-width="1.5"/>
  <line x1="226" y1="98" x2="226" y2="107" stroke="#1a4a6a" stroke-width="1.5"/>
  <line x1="228" y1="98" x2="230" y2="106" stroke="#1a4a6a" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════
       TALEX wordmark
  ════════════════════════════════════════════ -->
  <text x="200" y="232"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="900" text-anchor="middle"
        fill="#2d3f5e" letter-spacing="3">TALEX</text>

  <!-- ═══════════════════════════════════════════
       Tagline
  ════════════════════════════════════════════ -->
  <text x="200" y="265"
        font-family="'Arial', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="600" text-anchor="middle"
        fill="#3ab87a" letter-spacing="4">LEARN, EARN, GET HIRED</text>
</svg>
