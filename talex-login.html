<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talex — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #00ffc8;
      --teal-dim: rgba(0, 255, 200, 0.18);
      --teal-glow: rgba(0, 255, 200, 0.08);
      --bg: #080d0f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --text: #e8f0ef;
      --muted: rgba(232,240,239,0.45);
      --hint: rgba(232,240,239,0.22);
      --display: 'Syne', sans-serif;
      --body: 'DM Sans', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--body);
      color: var(--text);
      cursor: default;
    }

    /* ── Background canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Noise grain overlay ── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── Ripple layer ── */
    #ripple-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      overflow: hidden;
    }

    .ripple-ring {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
    }

    /* ── Overlay dim ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 9;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background 0.6s ease;
    }

    #overlay.dimming {
      background: rgba(0,0,0,0.55);
    }

    /* ── Page wrapper ── */
    #page {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: transform 1.4s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #page.shrink {
      transform: scale(0.96);
      opacity: 0;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 3.5rem;
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(0,255,200,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(0,255,200,0.25), transparent 70%);
    }

    .logo-mark svg { position: relative; z-index: 1; }

    .logo-name {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.25s both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,200,0.35), transparent);
    }

    .card-title {
      font-family: var(--display);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* Fields */
    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 1rem;
    }

    .field label {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--hint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input {
      height: 44px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      font-size: 14px;
      font-family: var(--body);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field input::placeholder { color: var(--hint); }

    .field input:focus {
      border-color: rgba(0,255,200,0.4);
      background: rgba(0,255,200,0.03);
      box-shadow: 0 0 0 3px rgba(0,255,200,0.08);
    }

    /* Forgot */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -6px;
      margin-bottom: 1.5rem;
    }

    .forgot-row a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-row a:hover { color: var(--teal); }

    /* Sign in button */
    #sign-in-btn {
      position: relative;
      width: 100%;
      height: 46px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #00e8b5, #00ffc8 60%, #00d4b0);
      color: #04201a;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--body);
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      overflow: hidden;
    }

    #sign-in-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: inherit;
    }

    #sign-in-btn:hover { opacity: 0.9; }
    #sign-in-btn:active { transform: scale(0.985); }

    .btn-label {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
    }

    .divider span {
      font-size: 11px;
      color: var(--hint);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }

    /* Social button */
    .btn-ghost {
      width: 100%;
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      font-size: 13.5px;
      font-family: var(--body);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }

    /* Footer */
    .card-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 12.5px;
      color: var(--hint);
    }

    .card-footer a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover { text-decoration: underline; }

    /* Tagline below card */
    .tagline {
      margin-top: 2rem;
      font-size: 12px;
      color: var(--hint);
      letter-spacing: 0.04em;
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.4s both;
    }

    /* ── Dashboard "page" (hidden behind) ── */
    #dashboard {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease 1.0s;
    }

    #dashboard.visible {
      opacity: 1;
      pointer-events: all;
    }

    .dash-greeting {
      font-family: var(--display);
      font-size: 32px;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: -0.01em;
      animation: none;
    }

    .dash-sub {
      font-size: 15px;
      color: var(--muted);
    }

    .dash-back {
      margin-top: 1.5rem;
      padding: 10px 22px;
      border-radius: 8px;
      border: 1px solid rgba(0,255,200,0.25);
      background: transparent;
      color: var(--teal);
      font-size: 13px;
      font-family: var(--body);
      cursor: pointer;
      transition: background 0.2s;
    }

    .dash-back:hover { background: rgba(0,255,200,0.06); }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes rippleExpand {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Ambient background canvas -->
  <canvas id="bg-canvas"></canvas>
  <div class="grain"></div>

  <!-- Ripple + overlay -->
  <div id="overlay"></div>
  <div id="ripple-layer"></div>

  <!-- Login page -->
  <div id="page">
    <div class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 10 Q10 2 16 10 Q10 18 4 10Z" stroke="#00ffc8" stroke-width="1.2" fill="none"/>
          <circle cx="10" cy="10" r="2" fill="#00ffc8"/>
        </svg>
      </div>
      <span class="logo-name">TALEX</span>
    </div>

    <div class="card">
      <p class="card-title">Welcome back</p>
      <p class="card-sub">Sign in to your Talex workspace.</p>

      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@talex.io" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••" />
      </div>

      <div class="forgot-row"><a href="#">Forgot password?</a></div>

      <button id="sign-in-btn">
        <span class="btn-label">Sign In</span>
      </button>

      <div class="divider"><span>or continue with</span></div>

      <button class="btn-ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="card-footer">No account? <a href="#">Create one free</a></p>
    </div>

    <p class="tagline">Secured with end-to-end encryption</p>
  </div>

  <!-- Dashboard landing -->
  <div id="dashboard">
    <p class="dash-greeting">Welcome to Talex</p>
    <p class="dash-sub">Your workspace is ready.</p>
    <button class="dash-back" onclick="resetToLogin()">← Back to login</button>
  </div>

  <script>
    /* ── Ambient background: drifting teal orbs ── */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, orbs = [];

    function resizeCanvas() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function makeOrb() {
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: 120 + Math.random() * 180,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        a: 0.025 + Math.random() * 0.03
      };
    }

    resizeCanvas();
    for (let i = 0; i < 4; i++) orbs.push(makeOrb());
    window.addEventListener('resize', resizeCanvas);

    function drawBg() {
      ctx.clearRect(0, 0, W, H);
      for (const o of orbs) {
        const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
        g.addColorStop(0, `rgba(0,255,200,${o.a})`);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
        ctx.fill();
        o.x += o.vx; o.y += o.vy;
        if (o.x < -o.r) o.x = W + o.r;
        if (o.x > W + o.r) o.x = -o.r;
        if (o.y < -o.r) o.y = H + o.r;
        if (o.y > H + o.r) o.y = -o.r;
      }
      requestAnimationFrame(drawBg);
    }
    drawBg();

    /* ── Water ripple ── */
    const rippleLayer = document.getElementById('ripple-layer');
    const overlay     = document.getElementById('overlay');
    const page        = document.getElementById('page');
    const dashboard   = document.getElementById('dashboard');
    const btn         = document.getElementById('sign-in-btn');

    function spawnRipple(x, y, delay, size, color, borderWidth) {
      const el = document.createElement('div');
      el.className = 'ripple-ring';
      const diameter = size;
      Object.assign(el.style, {
        left: x + 'px',
        top: y + 'px',
        width: diameter + 'px',
        height: diameter + 'px',
        border: `${borderWidth}px solid ${color}`,
        boxShadow: `0 0 ${borderWidth * 6}px ${color}, inset 0 0 ${borderWidth * 3}px ${color}`,
        animationDelay: delay + 'ms',
        animationDuration: '1400ms',
        animationTimingFunction: 'cubic-bezier(0.22, 1, 0.36, 1)',
        animationFillMode: 'both',
        animationName: 'rippleExpand',
        filter: 'blur(0.4px)',
      });
      rippleLayer.appendChild(el);
      return el;
    }

    function triggerRipple(x, y) {
      /* Dim + shrink page */
      overlay.classList.add('dimming');
      page.classList.add('shrink');

      /* Compute diagonal to ensure full-screen coverage */
      const maxD = Math.sqrt(W * W + H * H) * 2.2;

      /* Wave rings — staggered, different opacities & sizes */
      const rings = [
        { delay: 0,   size: maxD * 0.15, color: 'rgba(0,255,200,0.9)', bw: 2.5 },
        { delay: 80,  size: maxD * 0.35, color: 'rgba(0,255,200,0.65)', bw: 1.8 },
        { delay: 180, size: maxD * 0.6,  color: 'rgba(0,255,200,0.4)',  bw: 1.2 },
        { delay: 310, size: maxD * 0.85, color: 'rgba(0,255,200,0.22)', bw: 0.8 },
        { delay: 470, size: maxD,        color: 'rgba(0,255,200,0.1)',  bw: 0.5 },
      ];

      const els = rings.map(r => spawnRipple(x, y, r.delay, r.size, r.color, r.bw));

      /* Radial fill wash — canvas overlay */
      let fillStart = null;
      const fillDuration = 1100;
      const fillCanvas = document.createElement('canvas');
      fillCanvas.width = W; fillCanvas.height = H;
      Object.assign(fillCanvas.style, {
        position: 'absolute', inset: '0', pointerEvents: 'none'
      });
      rippleLayer.appendChild(fillCanvas);
      const fc = fillCanvas.getContext('2d');

      function animateFill(ts) {
        if (!fillStart) fillStart = ts;
        const p = Math.min((ts - fillStart) / fillDuration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        const radius = (maxD / 2) * eased;
        fc.clearRect(0, 0, W, H);
        const g = fc.createRadialGradient(x, y, 0, x, y, radius);
        g.addColorStop(0, `rgba(0,20,16,${0.72 * eased})`);
        g.addColorStop(0.6, `rgba(0,30,22,${0.4 * eased})`);
        g.addColorStop(1, 'transparent');
        fc.fillStyle = g;
        fc.fillRect(0, 0, W, H);
        if (p < 1) requestAnimationFrame(animateFill);
      }
      requestAnimationFrame(animateFill);

      /* Navigate after ripple completes */
      setTimeout(() => {
        dashboard.classList.add('visible');
        /* cleanup */
        els.forEach(e => e.remove());
        fillCanvas.remove();
      }, 1500);
    }

    btn.addEventListener('click', function(e) {
      const rect = btn.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top  + rect.height / 2;
      triggerRipple(x, y);
    });

    /* Touch support */
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      const t = e.touches[0];
      triggerRipple(t.clientX, t.clientY);
    }, { passive: false });

    /* Reset */
    function resetToLogin() {
      dashboard.classList.remove('visible');
      overlay.classList.remove('dimming');
      page.classList.remove('shrink');
      rippleLayer.innerHTML = '';
    }

    /* Click anywhere also triggers ripple (demo mode) */
    document.addEventListener('click', function(e) {
      if (e.target === btn || btn.contains(e.target)) return;
      if (dashboard.classList.contains('visible')) return;
    });
  </script>
</body>
</html>
