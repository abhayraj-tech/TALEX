<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TALEX – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Page background ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(160deg, #c9dff5 0%, #ddeeff 40%, #b8d4f0 100%);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Soft cloud blobs in background */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      filter: blur(60px);
      pointer-events: none;
    }
    body::before { width: 520px; height: 320px; top: -80px; left: -100px; }
    body::after  { width: 420px; height: 260px; bottom: -60px; right: -80px; }

    /* ── Outer card ── */
    .auth-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      max-width: 900px;
      min-height: 540px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.18);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ══════════════════════════════════════
       LEFT PANEL – illustrated / branded
    ══════════════════════════════════════ */
    .panel-left {
      position: relative;
      background: linear-gradient(160deg, #7ec8e3 0%, #a8d8ea 50%, #5ba3c9 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2.5rem;
      overflow: hidden;
    }

    /* Sky clouds */
    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.75);
      border-radius: 50px;
      filter: blur(2px);
    }
    .cloud-1 { width: 160px; height: 55px; top: 18px; left: -20px; animation: cloudDrift 18s linear infinite; }
    .cloud-2 { width: 110px; height: 40px; top: 55px; right: 10px; animation: cloudDrift 24s linear infinite reverse; }
    .cloud-3 { width: 80px;  height: 30px; top: 100px; left: 60px; animation: cloudDrift 20s linear infinite 4s; }

    @keyframes cloudDrift {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(18px); }
      100% { transform: translateX(0); }
    }

    /* Ground strip */
    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 110px;
      background: linear-gradient(180deg, #4a9e5c 0%, #3a8a4a 100%);
      border-radius: 0 0 0 24px;
    }
    .ground::before {
      content: '';
      position: absolute;
      top: -18px; left: 0; right: 0;
      height: 36px;
      background: #5cb870;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    /* ── TALEX mascot – pure CSS character ── */
    .mascot {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 190px;
      animation: mascotFloat 3.5s ease-in-out infinite;
    }

    @keyframes mascotFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-14px); }
    }

    /* Body */
    .m-body {
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 110px; height: 120px;
      background: radial-gradient(circle at 40% 35%, #d0eaf8, #7ec8e3);
      border-radius: 55px 55px 45px 45px;
      box-shadow: inset -8px -8px 20px rgba(0,0,0,0.1);
    }
    /* Fluffy fur overlay */
    .m-body::before {
      content: '';
      position: absolute;
      top: -18px; left: -12px; right: -12px; bottom: -4px;
      background: radial-gradient(circle at 50% 30%, #e8f5fc, #b8dff0);
      border-radius: 60px 60px 50px 50px;
      z-index: -1;
      box-shadow: 0 0 0 6px rgba(255,255,255,0.4);
    }

    /* Head */
    .m-head {
      position: absolute;
      bottom: 100px; left: 50%; transform: translateX(-50%);
      width: 90px; height: 85px;
      background: radial-gradient(circle at 40% 35%, #d8eef8, #7ec8e3);
      border-radius: 50%;
      box-shadow: inset -6px -6px 16px rgba(0,0,0,0.1);
    }
    /* Hair spikes */
    .m-head::before {
      content: '';
      position: absolute;
      top: -22px; left: 50%; transform: translateX(-50%);
      width: 70px; height: 40px;
      background: radial-gradient(circle at 50% 80%, #e8f5fc, #c0dff0);
      border-radius: 50% 50% 0 0;
      box-shadow: -18px 4px 0 -4px #d0eaf8, 18px 4px 0 -4px #d0eaf8;
    }

    /* Eyes */
    .m-eye {
      position: absolute;
      width: 22px; height: 22px;
      background: #1a1a2e;
      border-radius: 50%;
      top: 28px;
      box-shadow: inset 3px -3px 6px rgba(255,255,255,0.3);
    }
    .m-eye::after {
      content: '';
      position: absolute;
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 4px;
    }
    .m-eye-l { left: 16px; }
    .m-eye-r { right: 16px; }

    /* Smile */
    .m-smile {
      position: absolute;
      bottom: 16px; left: 50%; transform: translateX(-50%);
      width: 28px; height: 14px;
      border: 3px solid #1a1a2e;
      border-top: none;
      border-radius: 0 0 20px 20px;
    }

    /* Arms */
    .m-arm {
      position: absolute;
      width: 28px; height: 60px;
      background: radial-gradient(circle at 40% 30%, #d0eaf8, #7ec8e3);
      border-radius: 14px;
      bottom: 30px;
      box-shadow: inset -4px -4px 10px rgba(0,0,0,0.1);
    }
    .m-arm-l {
      left: -18px;
      transform: rotate(-30deg);
      transform-origin: top center;
      animation: waveArm 2s ease-in-out infinite;
    }
    .m-arm-r {
      right: -18px;
      transform: rotate(20deg);
      transform-origin: top center;
    }

    @keyframes waveArm {
      0%, 100% { transform: rotate(-30deg); }
      50%       { transform: rotate(-55deg); }
    }

    /* Legs */
    .m-leg {
      position: absolute;
      width: 26px; height: 38px;
      background: radial-gradient(circle at 40% 30%, #d0eaf8, #7ec8e3);
      border-radius: 13px 13px 10px 10px;
      bottom: -28px;
    }
    .m-leg-l { left: 22px; }
    .m-leg-r { right: 22px; }

    /* Tagline */
    .panel-tagline {
      position: relative;
      z-index: 2;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      line-height: 1.1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
      letter-spacing: -0.5px;
    }
    .panel-tagline span {
      display: block;
    }

    /* ══════════════════════════════════════
       RIGHT PANEL – form
    ══════════════════════════════════════ */
    .panel-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 3rem;
      background: #fff;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.75rem;
    }

    .brand-icon {
      width: 44px; height: 44px;
      background: #0a0a0f;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.5rem;
    }
    .brand-icon svg { width: 24px; height: 24px; }

    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: #0a0a0f;
    }

    .form-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.65rem;
      color: #0a0a0f;
      text-align: center;
      margin-bottom: 0.35rem;
      letter-spacing: -0.3px;
    }

    .form-subtitle {
      font-size: 0.82rem;
      color: #6b7280;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    /* Form fields */
    .field { margin-bottom: 1.1rem; }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    .field input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: #9ca3af; }
    .field input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
      background: #fff;
    }

    /* Remember + Forgot row */
    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.4rem;
    }
    .remember {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.8rem; color: #6b7280;
    }
    .remember input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: #7c3aed;
      cursor: pointer;
    }
    .forgot {
      font-size: 0.8rem;
      color: #7c3aed;
      text-decoration: none;
      font-weight: 600;
    }
    .forgot:hover { text-decoration: underline; }

    /* Primary button */
    .btn-signin {
      width: 100%;
      padding: 0.85rem;
      background: #0a0a0f;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 0.9rem;
    }
    .btn-signin:hover { background: #1e1e2e; transform: translateY(-1px); }
    .btn-signin:active { transform: translateY(0); }

    /* Google button */
    .btn-google {
      width: 100%;
      padding: 0.75rem;
      background: #fff;
      color: #374151;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1.25rem;
    }
    .btn-google:hover {
      border-color: #9ca3af;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.9rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: #e5e7eb;
    }
    .divider span { font-size: 0.75rem; color: #9ca3af; white-space: nowrap; }

    /* Sign up link */
    .signup-link {
      text-align: center;
      font-size: 0.82rem;
      color: #6b7280;
    }
    .signup-link a {
      color: #7c3aed;
      font-weight: 700;
      text-decoration: none;
    }
    .signup-link a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .auth-card {
        grid-template-columns: 1fr;
        max-width: 420px;
      }
      .panel-left { display: none; }
      .panel-right { padding: 2.5rem 2rem; }
    }
  </style>
</head>
<body>

  <div class="auth-card">

    <!-- ══ LEFT PANEL ══ -->
    <div class="panel-left">
      <!-- Clouds -->
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>

      <!-- Ground -->
      <div class="ground"></div>

      <!-- CSS Mascot -->
      <div class="mascot">
        <!-- Arms -->
        <div class="m-arm m-arm-l"></div>
        <div class="m-arm m-arm-r"></div>
        <!-- Body -->
        <div class="m-body">
          <div class="m-leg m-leg-l"></div>
          <div class="m-leg m-leg-r"></div>
        </div>
        <!-- Head -->
        <div class="m-head">
          <div class="m-eye m-eye-l"></div>
          <div class="m-eye m-eye-r"></div>
          <div class="m-smile"></div>
        </div>
      </div>

      <!-- Tagline -->
      <div class="panel-tagline">
        <span>LEARN.</span>
        <span>EARN.</span>
        <span>GROW.</span>
      </div>
    </div>

    <!-- ══ RIGHT PANEL ══ -->
    <div class="panel-right">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <!-- Lightning bolt -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"
                  fill="#ffe17c" stroke="#ffe17c" stroke-width="1.5"
                  stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="brand-name">TALEX</span>
      </div>

      <h1 class="form-title">WELCOME BACK</h1>
      <p class="form-subtitle">Enter your email and password to access your account</p>

      <form id="signinForm" onsubmit="handleSignin(event)">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email"
                 placeholder="Enter your email" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Enter your password" required autocomplete="current-password" />
        </div>

        <div class="field-row">
          <label class="remember">
            <input type="checkbox" name="remember" />
            Remember me
          </label>
          <a href="/forgot-password" class="forgot">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-signin">Sign In</button>
      </form>

      <div class="divider"><span>or</span></div>

      <button class="btn-google" onclick="handleGoogle()">
        <!-- Google G logo -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <p class="signup-link">
        Don't have an account? <a href="/signup">Sign up</a>
      </p>

    </div>
  </div>

  <script>
    async function handleSignin(e) {
      e.preventDefault();
      const btn = document.querySelector('.btn-signin');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('talex_token', data.token);
          window.location.href = '/dashboard';
        } else {
          alert(data.message || 'Invalid credentials. Please try again.');
          btn.textContent = 'Sign In';
          btn.disabled = false;
        }
      } catch {
        // Dev fallback — no backend running
        alert('Sign-in successful! (Backend not connected yet)');
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }

    function handleGoogle() {
      window.location.href = '/api/auth/google';
    }
  </script>
</body>
</html>
