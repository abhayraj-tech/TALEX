<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TALEX — Explore Courses</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="explore_courses.css"/>
  <style>
    body.is-embedded .page-header { display: none !important; }
    body.is-embedded .dashboard-wrapper { padding-top: 20px !important; }
  </style>
</head>
<body class="is-embedded">
  <script>
    if (window.parent === window) {
      document.body.classList.remove('is-embedded');
    }
    // Theme Sync
    (function() {
      const applyTheme = (theme) => document.documentElement.setAttribute('data-theme', theme);
      const saved = localStorage.getItem('talex_theme') || 'dark';
      applyTheme(saved);
      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'THEME_CHANGE') applyTheme(e.data.theme);
      });
    })();
  </script>

<!-- CURSOR GLOW -->
<div id="cursor-glow"></div>

<!-- MAIN CONTAINER -->
<div class="dashboard-wrapper">
  <div class="layout-container">
    <nav class="side-tabs">
      <div class="tabs-group">
        <p class="tabs-label">Categories</p>
        <button class="tab active" onclick="UI.setFilter('All', this)">🎓 All Courses</button>
        <button class="tab" onclick="UI.setFilter('AI & ML', this)">🤖 AI & ML</button>
        <button class="tab" onclick="UI.setFilter('Design', this)">🎨 Design</button>
        <button class="tab" onclick="UI.setFilter('Web Dev', this)">💻 Web Dev</button>
        <button class="tab" onclick="UI.setFilter('Data', this)">📊 Data Science</button>
        <button class="tab" onclick="UI.setFilter('Startup', this)">🚀 Startup</button>
      </div>
      <div class="tabs-group">
        <p class="tabs-label">Difficulty</p>
        <button class="tab" onclick="UI.setFilter('Beginner', this)">🌱 Beginner</button>
        <button class="tab" onclick="UI.setFilter('Advanced', this)">⚡ Advanced</button>
      </div>
    </nav>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content-area">
  <!-- Header -->
  <header class="page-header">
    <div class="header-content">
      <div class="title-section">
        <h1>Explore <span class="accent" style="color:var(--accent);">Courses</span></h1>
        <p>Curated learning paths tailored to your skills and goals.</p>
      </div>
      <button class="btn-back" onclick="if(window.parent && window.parent.switchPage){ window.parent.switchPage('dashboard'); } else { window.location.href='dashboard.html'; }">Back to Dashboard</button>
    </div>
  </header>

  <!-- Content -->
  <main class="page-content">
    <div class="hero-stats" style="margin-bottom:32px;">
      <div class="stat"><span class="stat-num" id="totalCount">—</span><span class="stat-label">Courses</span></div>
      <div class="stat"><span class="stat-num">12</span><span class="stat-label">Categories</span></div>
      <div class="stat"><span class="stat-num">4.8★</span><span class="stat-label">Avg Rating</span></div>
      <div class="stat"><span class="stat-num">2.5k</span><span class="stat-label">Active Learners</span></div>
    </div>

  <!-- SEARCH BAR -->
  <div class="search-container" style="margin-bottom: 24px;">
    <div class="search-bar" style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); max-width: 400px;">
      <span style="opacity: 0.5;">🔍</span>
      <input type="text" id="exploreSearchInput" placeholder="Search for courses..." style="background: transparent; border: none; outline: none; color: #fff; width: 100%; font-size: 14px;"/>
    </div>
  </div>

  <!-- LOADING STATE -->
  <div id="loadingState" class="loading-state">
    <div class="spinner"></div>
    <span>Loading courses…</span>
  </div>

  <!-- GRID -->
  <div class="courses-grid" id="coursesGrid"></div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState" style="display:none">
    <svg width="48" height="48" fill="none" stroke="#00D4C8" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>No courses match your filter.</p>
  </div>
  </main>
</div>
</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="UI.closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal">
    <button class="modal-close" onclick="UI.closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="explore_backend.js"></script>
<script src="explore.js"></script>
<script>
  // Cursor Glow Effect
  const cursorGlow = document.getElementById('cursor-glow');
  if (cursorGlow) {
    document.addEventListener('mousemove', (e) => {
      cursorGlow.style.left = e.clientX + 'px';
      cursorGlow.style.top = e.clientY + 'px';
    });
  }
</script>
</body>
</html>
