<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skill Button – TALEX</title>
  <link rel="stylesheet" href="skill-button.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="preview-area">
    <h2 class="label">Skill Button</h2>

    <!-- Web Development -->
    <button class="skill-btn" data-color="blue">
      <span class="skill-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </span>
      <span class="skill-info">
        <span class="skill-name">Web Development</span>
        <span class="skill-meta">12 courses · 3 badges earned</span>
      </span>
      <span class="skill-arrow">›</span>
    </button>

    <!-- AI & Machine Learning -->
    <button class="skill-btn" data-color="purple">
      <span class="skill-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
      </span>
      <span class="skill-info">
        <span class="skill-name">AI & Machine Learning</span>
        <span class="skill-meta">8 courses · 1 badge earned</span>
      </span>
      <span class="skill-arrow">›</span>
    </button>

    <!-- UI/UX Design -->
    <button class="skill-btn" data-color="pink">
      <span class="skill-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
      </span>
      <span class="skill-info">
        <span class="skill-name">UI/UX Design</span>
        <span class="skill-meta">6 courses · 2 badges earned</span>
      </span>
      <span class="skill-arrow">›</span>
    </button>

    <!-- Data Science -->
    <button class="skill-btn" data-color="teal">
      <span class="skill-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      <span class="skill-info">
        <span class="skill-name">Data Science</span>
        <span class="skill-meta">10 courses · 4 badges earned</span>
      </span>
      <span class="skill-arrow">›</span>
    </button>
  </div>
</body>
</html>
