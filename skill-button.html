<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skill Matrix – TALEX</title>
  <link rel="stylesheet" href="skill-button.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  
  <div id="cursor-glow"></div>
  
  <div class="dashboard-wrapper">
    <!-- Header -->
    <header class="page-header">
      <div class="header-content">
        <div class="title-section">
          <h1>Skill Matrix</h1>
          <p>Visualize your technical growth and core competencies.</p>
        </div>
        <button class="btn-back" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
      </div>
    </header>

    <!-- Content -->
    <main class="page-content">
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-value">12</div>
          <div class="stat-label">Active Skills</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">4</div>
          <div class="stat-label">Mastered</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">85%</div>
          <div class="stat-label">Avg Proficiency</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">+15%</div>
          <div class="stat-label">Monthly Growth</div>
        </div>
      </div>

      <div class="skills-grid" id="skillsGrid">
        <!-- Skills generated by JS -->
      </div>
    </main>
  </div>

  <script>
    // Cursor Glow Effect
    const cursorGlow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', (e) => {
      cursorGlow.style.left = e.clientX + 'px';
      cursorGlow.style.top = e.clientY + 'px';
    });

    const skillsData = [
      { name: "Frontend Development", level: "Master", progress: 95, icon: "💻", color: "--cyan" },
      { name: "Backend Architecture", level: "Advanced", progress: 80, icon: "⚙️", color: "--purple" },
      { name: "UI/UX Design", level: "Master", progress: 90, icon: "🎨", color: "--pink" },
      { name: "Data Structures", level: "Intermediate", progress: 65, icon: "🗄️", color: "--gold" },
      { name: "Cloud Integration", level: "Advanced", progress: 75, icon: "☁️", color: "--teal" },
      { name: "Machine Learning", level: "Beginner", progress: 30, icon: "🤖", color: "--rose" },
      { name: "Cybersecurity", level: "Intermediate", progress: 55, icon: "🛡️", color: "--cyan" },
      { name: "Agile Management", level: "Master", progress: 100, icon: "📈", color: "--purple" }
    ];

    function renderSkills() {
      const grid = document.getElementById('skillsGrid');
      grid.innerHTML = skillsData.map(skill => `
        <div class="skill-card" style="--skill-color: var(${skill.color})">
          <div class="skill-header">
            <div class="skill-icon">${skill.icon}</div>
            <div class="skill-title-wrap">
              <h3 class="skill-name">${skill.name}</h3>
              <span class="skill-level">${skill.level}</span>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-info">
              <span>Proficiency</span>
              <span>${skill.progress}%</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width: 0%" data-target="${skill.progress}%"></div>
            </div>
          </div>
        </div>
      `).join('');

      // Animate progress bars
      setTimeout(() => {
        document.querySelectorAll('.progress-bar-fill').forEach(bar => {
          bar.style.width = bar.getAttribute('data-target');
        });
      }, 100);
    }

    document.addEventListener('DOMContentLoaded', renderSkills);
  </script>
</body>
</html>
