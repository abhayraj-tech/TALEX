<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Community Button – TALEX</title>
  <link rel="stylesheet" href="community-button.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="preview-area">
    <h2 class="label">Community Button</h2>

    <!-- Default join -->
    <button class="community-btn">
      <span class="community-avatars">
        <span class="avatar" style="background:#4d9fff;">A</span>
        <span class="avatar" style="background:#a78bfa;">B</span>
        <span class="avatar" style="background:#f472b6;">C</span>
      </span>
      <span class="community-info">
        <span class="community-name">Design Guild</span>
        <span class="community-meta">1.2k members</span>
      </span>
      <span class="community-cta join">Join</span>
    </button>

    <!-- Joined state -->
    <button class="community-btn joined">
      <span class="community-avatars">
        <span class="avatar" style="background:#00e5c3;">D</span>
        <span class="avatar" style="background:#f5a623;">E</span>
        <span class="avatar" style="background:#f472b6;">F</span>
      </span>
      <span class="community-info">
        <span class="community-name">AI Builders</span>
        <span class="community-meta">3.8k members</span>
      </span>
      <span class="community-cta joined-tag">Joined ✓</span>
    </button>

    <!-- Featured / highlight -->
    <button class="community-btn featured">
      <span class="community-avatars">
        <span class="avatar" style="background:#f5a623;">G</span>
        <span class="avatar" style="background:#4d9fff;">H</span>
        <span class="avatar" style="background:#00e5c3;">I</span>
        <span class="avatar more">+9</span>
      </span>
      <span class="community-info">
        <span class="community-name">Open Source Hub</span>
        <span class="community-meta">12k members · Active now</span>
      </span>
      <span class="community-cta join">Join</span>
    </button>
  </div>
</body>
</html>
