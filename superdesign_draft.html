<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALEX - Connect Your Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        @import url('https://api.fontshare.com/v2/css?f[]=clash-grotesk@600,700&f[]=satoshi@400,500&display=swap');

        body {
            font-family: 'Satoshi', sans-serif;
            overflow-x: hidden;
            margin: 0;
            background-color: #0f172a;
        }

        h1, h2, h3 {
            font-family: 'Clash Grotesk', sans-serif;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
        }

        .input-field {
            transition: all 0.2s ease;
        }

        .input-field:focus {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(45, 212, 191, 0.5);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; filter: blur(2px); }
            50% { opacity: 1; filter: blur(0px); }
        }

        .neuron-glow {
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.6);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(45, 212, 191, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(45, 212, 191, 0.4);
        }
    </style>
</head>
<body>
    <div id="root" class="min-h-screen bg-slate-900 flex flex-col items-center justify-center relative py-20 px-4">
        
        <canvas id="neuron-canvas"></canvas>

        <!-- NAVIGATION -->
        <header class="fixed top-0 left-0 w-full p-6 md:p-8 flex justify-between items-center z-50">
            <div class="flex items-center gap-3">
                <img src="https://vgbujcuwptvheqijyjbe.supabase.co/storage/v1/object/public/hmac-uploads/uploads/70a3abb9-3481-48c8-b52d-7b9b217dd6b4/1776738023374-7bbf9499/talex.jpeg" 
                     alt="TALEX Logo" 
                     class="w-10 h-10 rounded-xl shadow-lg shadow-teal-500/10">
                <span class="text-2xl font-bold tracking-tight text-white" id="logo-text">TALEX</span>
            </div>
            <a href="#" id="nav-signin-link" class="text-white/60 font-medium hover:text-white transition-colors duration-300">Sign In</a>
        </header>

        <!-- MAIN FORM SECTION -->
        <main class="relative z-40 w-full max-w-xl">
            <div id="form-container" class="glass-card p-8 md:p-12 rounded-[2.5rem] shadow-2xl shadow-teal-500/5">
                
                <div id="form-content" class="space-y-8">
                    <div class="space-y-2 text-center md:text-left">
                        <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight" id="main-title">Join the network.</h1>
                        <p class="text-slate-400">Map your skills, unlock certified badges, and connect with global opportunities.</p>
                    </div>

                    <form id="signup-form" class="space-y-5" onsubmit="event.preventDefault(); handleCreateAccount();">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold ml-1 uppercase tracking-wider text-white/70">Full Name</label>
                            <input type="text" placeholder="Alex Thompson" required class="input-field w-full px-6 py-4 rounded-2xl bg-slate-800/40 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500/50">
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-sm font-semibold ml-1 uppercase tracking-wider text-white/70">Email Address</label>
                            <input type="email" placeholder="alex@talex.io" required class="input-field w-full px-6 py-4 rounded-2xl bg-slate-800/40 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500/50">
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-semibold ml-1 uppercase tracking-wider text-white/70">Password</label>
                            <input type="password" placeholder="••••••••" required class="input-field w-full px-6 py-4 rounded-2xl bg-slate-800/40 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500/50">
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-semibold ml-1 uppercase tracking-wider text-white/70">Your Interests</label>
                            <div class="relative">
                                <select required class="input-field w-full px-6 py-4 rounded-2xl bg-slate-800/40 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-teal-500/50 appearance-none">
                                    <option value="" disabled selected class="bg-slate-900">Select an interest</option>
                                    <option value="design" class="bg-slate-900">UI/UX Design</option>
                                    <option value="development" class="bg-slate-900">Software Development</option>
                                    <option value="data" class="bg-slate-900">Data Science</option>
                                    <option value="marketing" class="bg-slate-900">Marketing & Growth</option>
                                    <option value="product" class="bg-slate-900">Product Management</option>
                                </select>
                                <iconify-icon icon="lucide:chevron-down" class="absolute right-6 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none"></iconify-icon>
                            </div>
                        </div>

                        <button type="submit" id="cta-create-btn" class="w-full mt-6 py-5 bg-white text-slate-900 rounded-2xl font-bold text-lg hover:bg-teal-50 hover:shadow-[0_0_20px_rgba(45,212,191,0.2)] transition-all flex items-center justify-center gap-2 group">
                            <span id="btn-text">Create Account</span>
                            <iconify-icon icon="lucide:arrow-right" class="group-hover:translate-x-1 transition-transform"></iconify-icon>
                        </button>
                    </form>
                </div>
            </div>

            <!-- FOOTER INFO -->
            <p class="text-center mt-8 text-slate-500 text-sm z-40" id="footer-text">
                By signing up, you agree to join the network of innovation.
            </p>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('neuron-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 100;
        const connectionDist = 140;
        const animationIntensity = 0.8;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 2 + 1;
                this.pulse = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.vx * animationIntensity;
                this.y += this.vy * animationIntensity;
                this.pulse += 0.02;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                const pulseScale = 1 + Math.sin(this.pulse) * 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * pulseScale, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(45, 212, 191, 0.6)';
                ctx.fill();
                
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(45, 212, 191, 0.4)';
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < connectionDist) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        const opacity = (1 - dist / connectionDist) * 0.25;
                        ctx.strokeStyle = `rgba(45, 212, 191, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0;
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            drawLines();
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();

        function handleCreateAccount() {
            const btn = document.getElementById('cta-create-btn');
            const formContainer = document.getElementById('form-container');
            
            // Loading state
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.innerHTML = '<iconify-icon icon="lucide:loader-2" class="animate-spin text-2xl"></iconify-icon>';
            
            formContainer.classList.add('scale-[0.99]', 'opacity-90');
            
            // Direct redirect
            setTimeout(() => {
                window.location.href = '#dashboard';
            }, 1500);
        }
    </script>
</body>
</html>
